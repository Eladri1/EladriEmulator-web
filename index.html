<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador web de Sr. Croquetas ⚡</title>
    <style>
        :root {
            --bg-general: linear-gradient(3deg, #121212 0%, #000000 100%);
            --color-acento: #ffffff;
            --color-sombra: rgba(255, 255, 255, 0.3);
        }

        body {
            background: var(--bg-general);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        h1 { color: var(--color-acento); margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px var(--color-sombra); }
        
        #subtitulo { color: var(--color-acento); margin-bottom: 30px; font-size: 16px; opacity: 0.8; }

        #main-menu { display: flex; gap: 30px; }

        .console-card {
            background: #161616;
            border: 2px solid #333333;
            border-radius: 15px;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }

        .console-card:hover { transform: translateY(-10px); background: #1e1e1e; }
        .card-psx:hover { border-color: #0072ce; box-shadow: 0 15px 25px rgba(0, 114, 206, 0.5); }
        .card-n64:hover { border-color: #e60012; box-shadow: 0 15px 25px rgba(230, 0, 18, 0.5); }
        .card-nds:hover { border-color: #00e5ff; box-shadow: 0 15px 25px rgba(0, 229, 255, 0.5); }

        .console-card img { width: 130px; object-fit: contain; margin-bottom: 15px; filter: brightness(0) invert(1); }
        .console-card h3 { margin: 0; color: #ffffff; font-size: 18px; }

        #upload-screen { display: none; flex-direction: column; align-items: center; background: #161616; padding: 50px; border: 2px dashed var(--color-acento); border-radius: 12px; position: relative; }
        
        .upload-btn { background-color: var(--color-acento); color: #121212; padding: 15px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        input[type="file"] { display: none; }

        .btn-volver { position: absolute; top: 12px; left: 15px; background: none; border: 1px solid var(--color-acento); color: var(--color-acento); padding: 5px 12px; cursor: pointer; }

        #emulator-container { width: 800px; height: 600px; max-width: 95vw; max-height: 80vh; display: none; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

    <h1 id="titulo-principal">Emulador web de Sr. Croquetas 🕹️</h1>
    <p id="subtitulo">Selecciona la plataforma a emular</p>
    
    <div id="main-menu">
        <div class="console-card card-psx" onclick="iniciarCarga('psx', '.bin,.img,.chd,.iso', 'PlayStation 1')">
            <img src="ps1.png" alt="PS1">
            <h3>PlayStation 1</h3>
        </div>
        <div class="console-card card-nds" onclick="iniciarCarga('nds', '.nds', 'Nintendo DS')">
            <img src="nds.png" alt="NDS">
            <h3>Nintendo DS</h3>
        </div>
        <div class="console-card card-n64" onclick="iniciarCarga('n64', '.n64,.z64,.v64', 'Nintendo 64')">
            <img src="n64.png" alt="N64">
            <h3>Nintendo 64</h3>
        </div>
    </div>

    <div id="upload-screen">
        <button class="btn-volver" onclick="volver()">← Volver</button>
        <h2 id="titulo-carga" style="color: var(--color-acento);">Sube tu juego</h2>
        <label class="upload-btn">
            Seleccionar ROM
            <input type="file" id="rom-selector">
        </label>
    </div>

    <div id="emulator-container"></div>

    <script>
        let consolaActiva = "";
        
        function iniciarCarga(consola, ext, nombre) {
            consolaActiva = consola;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('subtitulo').style.display = 'none';
            document.getElementById('upload-screen').style.display = 'flex';
            document.getElementById('titulo-carga').innerText = 'Cargar ' + nombre;
            document.getElementById('rom-selector').accept = ext;
        }

        function volver() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('subtitulo').style.display = 'block';
            document.getElementById('upload-screen').style.display = 'none';
        }

        document.getElementById('rom-selector').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-screen').style.display = 'none';
            document.getElementById('titulo-principal').style.display = 'none';
            const container = document.getElementById('emulator-container');
            container.style.display = 'block';
            container.innerHTML = '<div id="game"></div>';

            // CONFIGURACIÓN OFICIAL DE EMULATORJS
            window.EJS_player = '#game';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_gameUrl = URL.createObjectURL(file);
            window.EJS_startOnLoaded = true;

            // Definir núcleo según consola
            if(consolaActiva === 'psx') window.EJS_core = 'pcsx_rearmed';
            else if(consolaActiva === 'n64') window.EJS_core = 'mupen64plus';
            else if(consolaActiva === 'nds') window.EJS_core = 'melonds';

            // Inyectar el script del cargador
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
