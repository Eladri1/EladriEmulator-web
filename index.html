<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador web de Sr. Croquetas ⚡</title>
    <style>
        /* 1. VARIABLES INICIALES */
        :root {
            --bg-general: linear-gradient(3deg, #121212 0%, #000000 100%);
            --color-acento: #ffffff;
            --color-sombra: rgba(255, 255, 255, 0.3);
        }

        body {
            background: var(--bg-general);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        h1 { 
            color: var(--color-acento); 
            margin-bottom: 5px; 
            font-size: 28px; 
            text-shadow: 0 0 10px var(--color-sombra);
            transition: color 0.3s, text-shadow 0.3s;
            font-weight: 800;
        }
        
        #subtitulo { 
            color: var(--color-acento); 
            margin-bottom: 30px; 
            font-size: 16px; 
            opacity: 0.8; 
            transition: color 0.3s;
        }

        /* ---------------- BOTÓN DE LA ESQUINA IZQUIERDA ---------------- */
        #btn-ir-miticos {
            position: absolute; top: 20px; left: 20px; text-decoration: none; 
            background: #00ff66; border: 2px solid #00ff66; color: #121212; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; 
            box-shadow: 0 0 15px rgba(0,255,102,0.4); transition: transform 0.2s, filter 0.2s; z-index: 10;
        }
        #btn-ir-miticos:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* ---------------- NUEVO BOTÓN SIMPLE PANEL EXTRA (ARRIBA DERECHA) ---------------- */
        #btn-abrir-modal {
            position: absolute; top: 20px; right: 20px;
            background: #16161a; border: 2px solid #333; color: #fff;
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.2s; z-index: 10;
            font-family: inherit;
        }
        #btn-abrir-modal:hover { border-color: #00ff66; box-shadow: 0 0 15px rgba(0,255,102,0.3); }

        /* ---------------- ESTILOS DEL MODAL (VENTANITA DE EXTRAS) ---------------- */
        /* Fondo que oscurece y desenfoca el menú de atrás */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px); z-index: 90;
        }

        /* Estructura de la ventanita */
        #modal-ventana {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 340px;
            background: #16161c; border: 2px solid #333344; border-radius: 15px;
            padding: 25px; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            flex-direction: column; gap: 20px;
        }

        .modal-cerrar {
            position: absolute; top: 12px; right: 15px; background: none;
            border: none; color: #888; font-size: 20px; cursor: pointer; transition: color 0.2s;
        }
        .modal-cerrar:hover { color: #ff3333; }

        #modal-ventana h2 { margin: 0; font-size: 20px; color: #00ff66; text-align: center; font-weight: 800; }
        #modal-ventana h3 { margin: 0 0 8px 0; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .modal-seccion { display: flex; flex-direction: column; gap: 10px; }

        /* Botones y Links del Panel */
        .modal-link, .modal-btn-juego {
            display: block; text-align: center; text-decoration: none; padding: 11px;
            border-radius: 8px; font-weight: bold; font-family: inherit; font-size: 14px;
            cursor: pointer; transition: background 0.2s, transform 0.1s; border: none;
        }
        .modal-link:active, .modal-btn-juego:active { transform: scale(0.98); }

        .link-extremo { background: #ff3333; color: white; }
        .link-extremo:hover { background: #e60000; box-shadow: 0 0 10px rgba(255,51,51,0.3); }

        .link-miticos { background: #0072ce; color: white; }
        .link-miticos:hover { background: #005bb3; box-shadow: 0 0 10px rgba(0,114,206,0.3); }

        .modal-btn-juego { background: #22222b; color: #fff; border: 1px solid #444455; }
        .modal-btn-juego:hover { background: #2d2d3a; border-color: #00ff66; }


        /* ---------------- MENÚ DE CONSOLAS PRINCIPAL ---------------- */
        #main-menu { display: flex; gap: 30px; }

        .console-card {
            background: #161616; border: 2px solid #333333; border-radius: 15px;
            width: 200px; height: 220px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s, background 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }
        .console-card:hover { transform: translateY(-10px); background: #1e1e1e; }
        .card-psx:hover { border-color: #0072ce; box-shadow: 0 15px 25px rgba(0, 114, 206, 0.5); }
        .card-n64:hover { border-color: #e60012; box-shadow: 0 15px 25px rgba(230, 0, 18, 0.5); }
        .card-nds:hover { border-color: #00e5ff; box-shadow: 0 15px 25px rgba(0, 229, 255, 0.5); }

        .console-card img { width: 130px; object-fit: contain; margin-bottom: 15px; filter: brightness(0) invert(1); }
        .console-card h3 { margin: 0; color: #ffffff; font-size: 18px; }

        /* ---------------- PANTALLA DE CARGA ---------------- */
        #upload-screen {
            display: none; flex-direction: column; align-items: center; background: #161616;
            padding: 50px 40px 40px 40px; border: 2px dashed var(--color-acento);
            border-radius: 12px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .upload-btn {
            background-color: var(--color-acento); color: #121212; padding: 15px 30px;
            font-size: 16px; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px var(--color-sombra);
        }
        .upload-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        input[type="file"] { display: none; }

        .btn-volver {
            position: absolute; top: 12px; left: 15px; background: none; border: 1px solid var(--color-acento);
            color: var(--color-acento); padding: 5px 12px; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: bold; transition: all 0.3s ease;
        }
        .btn-volver:hover { color: #ffffff; background-color: var(--color-acento); box-shadow: 0 0 15px var(--color-acento); }

        /* ---------------- CONTENEDOR 16:9 ---------------- */
        #emulator-container {
            width: 854px; height: 480px; max-width: 95vw; max-height: 80vh;
            display: none; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <!-- Botones Superiores -->
    <a href="miticos.html" id="btn-ir-miticos">🔥 Juegos Míticos</a>
    <button id="btn-abrir-modal" onclick="abrirModal()">🛠️ Panel Extra</button>

    <!-- CAPA OSCURA Y VENTANITA DESPLEGABLE -->
    <div id="modal-overlay" onclick="cerrarModal()"></div>
    <div id="modal-ventana">
        <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
        <h2>🚀 Panel de Extras</h2>
        
        <div class="modal-seccion">
            <h3>Páginas Especiales</h3>
            <a href="extremo.html" class="modal-link link-extremo">☢️ Tier Extremo</a>
            <a href="miticos.html" class="modal-link link-miticos">🔥 Juegos Míticos</a>
        </div>

        <div class="modal-seccion">
            <h3>Carga Automática (MAME/Retro)</h3>
            <button class="modal-btn-juego" onclick="cargarJuegoAutomatico('arcade', 'roms/metalslug.zip')">🕹️ Metal Slug (MAME)</button>
            <button class="modal-btn-juego" onclick="cargarJuegoAutomatico('snes', 'roms/mario_world.sfc')">🎮 Super Mario World (SNES)</button>
        </div>
    </div>

    <h1 id="titulo-principal">Emulador web de Sr. Croquetas 🕹️</h1>
    <p id="subtitulo">Selecciona la plataforma a emular</p>
    
    <div id="main-menu">
        <div class="console-card card-psx" onclick="abrirCarga('psx', '.bin,.img,.chd,.iso', 'PlayStation 1')">
            <img src="ps1.png" alt="PlayStation">
            <h3>PlayStation 1</h3>
        </div>
        <div class="console-card card-nds" onclick="abrirCarga('nds', '.nds', 'Nintendo DS')">
            <img src="nds.png" alt="DS">
            <h3>Nintendo DS</h3>
        </div>
        <div class="console-card card-n64" onclick="abrirCarga('n64', '.n64,.z64,.v64', 'Nintendo 64')">
            <img src="n64.png" alt="N64">
            <h3>Nintendo 64</h3>
        </div>
    </div>

    <div id="upload-screen">
        <button class="btn-volver" onclick="volverMenu()">← Volver</button>
        <h2 id="titulo-carga" style="color: var(--color-acento); margin-top: 0;">Sube tu juego</h2>
        <p id="info-formatos" style="color: #aaaaaa; font-size: 12px; margin-bottom: 20px;">Formatos soportados: </p>
        <label class="upload-btn">Seleccionar ROM<input type="file" id="rom-selector"></label>
    </div>

    <div id="emulator-container"></div>

    <script>
        const mainMenu = document.getElementById('main-menu');
        const uploadScreen = document.getElementById('upload-screen');
        const emuContainer = document.getElementById('emulator-container');
        const subtitulo = document.getElementById('subtitulo');
        const romSelector = document.getElementById('rom-selector');
        const root = document.documentElement;
        let consolaActiva = "";

        // FUNCIONES PARA EL MODAL
        function abrirModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('modal-ventana').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-ventana').style.display = 'none';
        }

        function abrirCarga(plataforma, extensiones, nombre) {
            consolaActiva = plataforma;
            document.getElementById('btn-ir-miticos').style.display = 'none';
            document.getElementById('btn-abrir-modal').style.display = 'none';
            if (plataforma === 'psx') {
                root.style.setProperty('--bg-general', 'linear-gradient(135deg, #002561 0%, #000000 100%)');
                root.style.setProperty('--color-acento', '#0072ce');
            } else if (plataforma === 'n64') {
                root.style.setProperty('--bg-general', 'linear-gradient(135deg, #7a0006 0%, #000000 100%)');
                root.style.setProperty('--color-acento', '#e60012');
            } else if (plataforma === 'nds') {
                root.style.setProperty('--bg-general', 'linear-gradient(135deg, #004b57 0%, #000000 100%)');
                root.style.setProperty('--color-acento', '#00e5ff');
            }
            mainMenu.style.display = 'none';
            uploadScreen.style.display = 'flex';
            subtitulo.style.display = 'none';
            document.getElementById('titulo-carga').innerText = 'Cargar juego de ' + nombre;
            document.getElementById('info-formatos').innerText = 'Formatos soportados: ' + extensiones;
            romSelector.accept = extensiones;
        }

        function volverMenu() {
            root.style.setProperty('--bg-general', 'linear-gradient(3deg, #121212 0%, #000000 100%)');
            root.style.setProperty('--color-acento', '#ffffff');
            uploadScreen.style.display = 'none';
            mainMenu.style.display = 'flex';
            subtitulo.style.display = 'block';
            document.getElementById('btn-ir-miticos').style.display = 'block';
            document.getElementById('btn-abrir-modal').style.display = 'block';
            romSelector.value = '';
        }

        // FUNCIÓN GENERAL PARA CARGAR JUEGOS AUTOMÁTICOS DESDE EL PANEL EXTRA
        function cargarJuegoAutomatico(core, rutaRom) {
            cerrarModal(); // Cierra el modal antes de lanzar el juego
            
            mainMenu.style.display = 'none';
            subtitulo.style.display = 'none';
            document.getElementById('btn-ir-miticos').style.display = 'none';
            document.getElementById('btn-abrir-modal').style.display = 'none';
            document.getElementById('titulo-principal').style.display = 'none';
            
            emuContainer.style.display = 'block';
            emuContainer.innerHTML = '<div id="game" style="width:100%; height:100%;"></div>';
            
            window.EJS_player = '#game';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_gameUrl = rutaRom;
            window.EJS_startOnLoaded = true;
            window.EJS_core = core;
            
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            document.body.appendChild(script);
        }

        romSelector.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            uploadScreen.style.display = 'none';
            document.getElementById('titulo-principal').style.display = 'none';
            emuContainer.style.display = 'block';
            emuContainer.innerHTML = '<div id="game" style="width:100%; height:100%;"></div>';
            const tRomUrl = URL.createObjectURL(file);
            window.EJS_player = '#game';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_gameUrl = tRomUrl;
            window.EJS_startOnLoaded = true;
            if (consolaActiva === 'psx') window.EJS_core = 'psx';
            else if (consolaActiva === 'n64') window.EJS_core = 'n64';
            else if (consolaActiva === 'nds') window.EJS_core = 'nds';
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
